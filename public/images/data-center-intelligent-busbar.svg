<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" class="w-full h-auto">
  <defs>
    <!-- Gradients for 3D effect -->
    <linearGradient id="cabinetGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8"/>
      <stop offset="100%" style="stop-color:#CCCCCC"/>
    </linearGradient>
    
    <linearGradient id="busbarGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#DAA520"/>
    </linearGradient>
    
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4A90E2"/>
      <stop offset="100%" style="stop-color:#2C5AB0"/>
    </linearGradient>
    
    <!-- Glow effects -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="#F5F7FA"/>
  
  <!-- Floor grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#E0E0E0" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="600" fill="url(#grid)" opacity="0.3"/>
  
  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" class="text-2xl font-bold" fill="#2C3E50">
    数据中心智能母线配电系统 / Data Center Intelligent Busbar System
  </text>
  
  <!-- Left Server Cabinet -->
  <g id="leftCabinet">
    <rect x="100" y="120" width="120" height="400" fill="url(#cabinetGradient)" stroke="#999" stroke-width="2" rx="8"/>
    <!-- Server slots -->
    <g opacity="0.8">
      <rect x="110" y="140" width="100" height="25" fill="#4A90E2" rx="2"/>
      <rect x="110" y="175" width="100" height="25" fill="#4A90E2" rx="2"/>
      <rect x="110" y="210" width="100" height="25" fill="#4A90E2" rx="2"/>
      <rect x="110" y="245" width="100" height="25" fill="#4A90E2" rx="2"/>
      <rect x="110" y="280" width="100" height="25" fill="#4A90E2" rx="2"/>
      <rect x="110" y="315" width="100" height="25" fill="#4A90E2" rx="2"/>
      <rect x="110" y="350" width="100" height="25" fill="#4A90E2" rx="2"/>
      <rect x="110" y="385" width="100" height="25" fill="#4A90E2" rx="2"/>
      <rect x="110" y="420" width="100" height="25" fill="#4A90E2" rx="2"/>
      <rect x="110" y="455" width="100" height="25" fill="#4A90E2" rx="2"/>
    </g>
    <!-- Cabinet label -->
    <text x="160" y="540" text-anchor="middle" class="text-sm font-medium" fill="#2C3E50">
      服务器机柜 A
    </text>
  </g>
  
  <!-- Center Server Cabinet -->
  <g id="centerCabinet">
    <rect x="540" y="120" width="120" height="400" fill="url(#cabinetGradient)" stroke="#999" stroke-width="2" rx="8"/>
    <!-- Server slots -->
    <g opacity="0.8">
      <rect x="550" y="140" width="100" height="25" fill="#4A90E2" rx="2"/>
      <rect x="550" y="175" width="100" height="25" fill="#4A90E2" rx="2"/>
      <rect x="550" y="210" width="100" height="25" fill="#4A90E2" rx="2"/>
      <rect x="550" y="245" width="100" height="25" fill="#4A90E2" rx="2"/>
      <rect x="550" y="280" width="100" height="25" fill="#4A90E2" rx="2"/>
      <rect x="550" y="315" width="100" height="25" fill="#4A90E2" rx="2"/>
      <rect x="550" y="350" width="100" height="25" fill="#4A90E2" rx="2"/>
      <rect x="550" y="385" width="100" height="25" fill="#4A90E2" rx="2"/>
      <rect x="550" y="420" width="100" height="25" fill="#4A90E2" rx="2"/>
      <rect x="550" y="455" width="100" height="25" fill="#4A90E2" rx="2"/>
    </g>
    <text x="600" y="540" text-anchor="middle" class="text-sm font-medium" fill="#2C3E50">
      服务器机柜 B
    </text>
  </g>
  
  <!-- Right Server Cabinet -->
  <g id="rightCabinet">
    <rect x="980" y="120" width="120" height="400" fill="url(#cabinetGradient)" stroke="#999" stroke-width="2" rx="8"/>
    <!-- Server slots -->
    <g opacity="0.8">
      <rect x="990" y="140" width="100" height="25" fill="#4A90E2" rx="2"/>
      <rect x="990" y="175" width="100" height="25" fill="#4A90E2" rx="2"/>
      <rect x="990" y="210" width="100" height="25" fill="#4A90E2" rx="2"/>
      <rect x="990" y="245" width="100" height="25" fill="#4A90E2" rx="2"/>
      <rect x="990" y="280" width="100" height="25" fill="#4A90E2" rx="2"/>
      <rect x="990" y="315" width="100" height="25" fill="#4A90E2" rx="2"/>
      <rect x="990" y="350" width="100" height="25" fill="#4A90E2" rx="2"/>
      <rect x="990" y="385" width="100" height="25" fill="#4A90E2" rx="2"/>
      <rect x="990" y="420" width="100" height="25" fill="#4A90E2" rx="2"/>
      <rect x="990" y="455" width="100" height="25" fill="#4A90E2" rx="2"/>
    </g>
    <text x="1040" y="540" text-anchor="middle" class="text-sm font-medium" fill="#2C3E50">
      服务器机柜 C
    </text>
  </g>
  
  <!-- Intelligent Busbar System -->
  <g id="busbarSystem">
    <!-- Main busbar horizontal run -->
    <rect x="250" y="80" width="700" height="20" fill="url(#busbarGradient)" rx="10" filter="url(#glow)"/>
    
    <!-- Busbar connection points -->
    <circle cx="280" cy="90" r="8" fill="#FF4444" filter="url(#glow)"/>
    <circle cx="600" cy="90" r="8" fill="#FF4444" filter="url(#glow)"/>
    <circle cx="920" cy="90" r="8" fill="#FF4444" filter="url(#glow)"/>
    
    <!-- Vertical drop connections to cabinets -->
    <line x1="280" y1="90" x2="160" y2="120" stroke="url(#busbarGradient)" stroke-width="12" stroke-linecap="round"/>
    <line x1="600" y1="90" x2="600" y2="120" stroke="url(#busbarGradient)" stroke-width="12" stroke-linecap="round"/>
    <line x1="920" y1="90" x2="1040" y2="120" stroke="url(#busbarGradient)" stroke-width="12" stroke-linecap="round"/>
    
    <!-- Power distribution units -->
    <rect x="240" y="130" width="40" height="60" fill="#34495E" rx="4"/>
    <rect x="580" y="130" width="40" height="60" fill="#34495E" rx="4"/>
    <rect x="900" y="130" width="40" height="60" fill="#34495E" rx="4"/>
    
    <!-- PDU labels -->
    <text x="260" y="210" text-anchor="middle" class="text-xs" fill="#2C3E50">PDU</text>
    <text x="600" y="210" text-anchor="middle" class="text-xs" fill="#2C3E50">PDU</text>
    <text x="920" y="210" text-anchor="middle" class="text-xs" fill="#2C3E50">PDU</text>
  </g>
  
  <!-- Data communication indicators -->
  <g id="dataFlow">
    <!-- Data flow lines -->
    <path d="M 280 250 Q 440 200 600 250" stroke="#00D4AA" stroke-width="3" fill="none" stroke-dasharray="10,5" opacity="0.7">
      <animate attributeName="stroke-dashoffset" values="0;15" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M 600 250 Q 760 200 920 250" stroke="#00D4AA" stroke-width="3" fill="none" stroke-dasharray="10,5" opacity="0.7">
      <animate attributeName="stroke-dashoffset" values="0;15" dur="2s" repeatCount="indefinite"/>
    </path>
    
    <!-- Data icons -->
    <g transform="translate(420,235)">
      <circle r="12" fill="#00D4AA" opacity="0.2"/>
      <text text-anchor="middle" dy="4" class="text-xs" fill="#00D4AA">数据</text>
    </g>
    <g transform="translate(780,235)">
      <circle r="12" fill="#00D4AA" opacity="0.2"/>
      <text text-anchor="middle" dy="4" class="text-xs" fill="#00D4AA">监控</text>
    </g>
  </g>
  
  <!-- Smart monitoring display -->
  <g id="monitoringPanel" transform="translate(300,320)">
    <rect width="600" height="200" fill="#2C3E50" rx="8" opacity="0.9"/>
    <rect x="10" y="10" width="580" height="30" fill="#34495E" rx="4"/>
    <text x="300" y="30" text-anchor="middle" class="text-sm font-bold" fill="#ECF0F1">
      智能母线监控系统 / Intelligent Busbar Monitoring
    </text>
    
    <!-- Monitoring data -->
    <g transform="translate(20,60)">
      <!-- Current monitoring -->
      <rect x="0" y="0" width="180" height="60" fill="#34495E" rx="4"/>
      <text x="90" y="20" text-anchor="middle" class="text-xs" fill="#ECF0F1">实时电流</text>
      <text x="90" y="40" text-anchor="middle" class="text-lg font-bold" fill="#3498DB">2,450A</text>
      
      <!-- Power monitoring -->
      <rect x="200" y="0" width="180" height="60" fill="#34495E" rx="4"/>
      <text x="290" y="20" text-anchor="middle" class="text-xs" fill="#ECF0F1">功率负载</text>
      <text x="290" y="40" text-anchor="middle" class="text-lg font-bold" fill="#E74C3C">98.2%</text>
      
      <!-- Temperature monitoring -->
      <rect x="400" y="0" width="160" height="60" fill="#34495E" rx="4"/>
      <text x="480" y="20" text-anchor="middle" class="text-xs" fill="#ECF0F1">温度</text>
      <text x="480" y="40" text-anchor="middle" class="text-lg font-bold" fill="#F39C12">24°C</text>
      
      <!-- Status indicators -->
      <rect x="0" y="80" width="560" height="40" fill="#34495E" rx="4"/>
      <text x="20" y="100" class="text-sm" fill="#ECF0F1">系统状态:</text>
      <circle cx="120" cy="96" r="6" fill="#2ECC71"/>
      <text x="140" y="100" class="text-sm" fill="#2ECC71">正常运行</text>
      <text x="250" y="100" class="text-sm" fill="#ECF0F1">预测性维护: 已启用</text>
      <text x="450" y="100" class="text-sm" fill="#ECF0F1">能效: 94.8%</text>
    </g>
  </g>
  
  <!-- Feature callouts -->
  <g id="features">
    <!-- Power + Data transmission -->
    <g transform="translate(50,260)">
      <rect width="150" height="50" fill="#ECF0F1" rx="25" opacity="0.9"/>
      <text x="75" y="20" text-anchor="middle" class="text-xs font-medium" fill="#2C3E50">电力 + 数据传输</text>
      <text x="75" y="35" text-anchor="middle" class="text-xs" fill="#7F8C8D">Power + Data</text>
    </g>
    
    <!-- High current capacity -->
    <g transform="translate(1000,260)">
      <rect width="150" height="50" fill="#ECF0F1" rx="25" opacity="0.9"/>
      <text x="75" y="20" text-anchor="middle" class="text-xs font-medium" fill="#2C3E50">高电流容量</text>
      <text x="75" y="35" text-anchor="middle" class="text-xs" fill="#7F8C8D">Up to 2,500A</text>
    </g>
  </g>
  
  <!-- Siemens and Supermicro branding area -->
  <g transform="translate(400,560)">
    <text x="200" y="20" text-anchor="middle" class="text-sm" fill="#7F8C8D">
      基于 Siemens SIVACON 8PS LData 与 Supermicro DCSE 技术
    </text>
  </g>
</svg>